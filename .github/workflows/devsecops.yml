name: LMS DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Secrets Detection ──────────────────────────────────────────────
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan . > /tmp/secrets-scan.json
          detect-secrets audit /tmp/secrets-scan.json || true
          # Fail if any NEW secrets found beyond the baseline
          detect-secrets-hook --baseline .secrets.baseline

  # ── Stage 2: SAST — SonarQube ───────────────────────────────────────────────
  sast:
    name: SAST — SonarQube
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarQube needs full history for blame

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and SAST scan
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          JWT_SECRET:     ${{ secrets.JWT_SECRET }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      # Quality Gate: 0 new Blocker, 0 new Critical — build fails if not met

  # ── Stage 3: Build Docker Image ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package application
        run: mvn clean package -DskipTests

      - name: Build Docker image (hardened)
        run: docker build -f Dockerfile.secure -t lms:${{ github.sha }} .

      - name: Save image for next stages
        run: docker save lms:${{ github.sha }} | gzip > lms-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: lms-image.tar.gz

  # ── Stage 4: Container Scan — Trivy ─────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < lms-image.tar.gz
      
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy — image CVE scan (blocks on CRITICAL)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format sarif \
            --output trivy-results.sarif \
            lms:${{ github.sha }}

      - name: Trivy — Dockerfile misconfiguration scan
        run: trivy config ./Dockerfile.secure

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

  # ── Stage 5: IaC Security Scan — Checkov ────────────────────────────────────
  iac-scan:
    name: IaC Scan — Checkov
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Checkov — Terraform scan (standard policies)
        run: |
          checkov -d terraform/lms \
            --compact \
            --output junitxml > checkov-results.xml || true

      - name: Checkov — with custom SBI policy (CKV_SBI_001)
        run: |
          checkov -d terraform/lms \
            --external-checks-dir custom_policies \
            --compact

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results.xml

  # ── Stage 6: DAST — OWASP ZAP ───────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: [container-scan, iac-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < lms-image.tar.gz

      - name: Start LMS for DAST
        run: |
          docker run -d --name lms-dast \
            -p 8080:8080 \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e DB_USER=sa \
            -e DB_PASSWORD= \
            lms:${{ github.sha }}
          # Wait for application to be ready
          for i in {1..12}; do
            curl -sf http://localhost:8080/actuator/health && break
            echo "Waiting for LMS... ($i/12)"
            sleep 10
          done

      - name: DAST — ZAP API scan (OpenAPI auto-discovery)
        run: |
          docker run --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t http://localhost:8080/v3/api-docs \
            -f openapi \
            -r zap-report.html \
            -I   # do not fail build on alerts — review report manually in lab

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: zap-report.html

      - name: Stop LMS container
        if: always()
        run: docker stop lms-dast || true
